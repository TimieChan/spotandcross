<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>First to Cross</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="confettiLayer" aria-hidden="true"></div>

  <main class="app">
    <header class="topBar">
      <div class="brand">
        <h1>🎉 First to Cross</h1>
        <p>Find fast. Cross faster.</p>
      </div>

      <div class="gameStatus">
        <div id="roundInfo" class="chip">Round 0</div>
        <div id="timer" class="chip">0.0s</div>
        <div id="countdown" class="countdown"></div>
      </div>

      <div class="controls">
        <button id="startBtn" type="button">Start Game</button>
        <button id="newBtn" type="button">New Game</button>
        <button id="muteBtn" type="button">🔊 Sound</button>
      </div>
    </header>

    <section id="instruction" class="instruction">
      Tap Start Game to begin!
    </section>

    <section class="scoreRow">
      <div id="p1Score" class="scoreCard p1Score">💙 Player 1: 0 / 144</div>
      <div id="p2Score" class="scoreCard p2Score">🧡 Player 2: 0 / 144</div>
    </section>

    <section class="playArea">
      <section class="numberSide">
        <div class="sectionLabel">🔎 Number Sheet</div>
        <div id="numberSheet" class="numberSheet"></div>
      </section>

      <aside id="gridSide" class="gridSide">
        <div class="gridHeader">
          <h2 id="gridTitle">Crossing Grid</h2>
          <p id="gridSubtitle">The active player's grid will appear here.</p>
        </div>

        <div class="gridBox">
          <div id="activeGrid" class="crossGrid"></div>
        </div>
      </aside>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modalCard">
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>
      <button id="modalBtn" type="button">Continue</button>
    </div>
  </div>

  <div id="victoryScreen" class="victory hidden">
    <div class="victoryCard">
      <h1 id="winnerText">🎉 Player X Wins!</h1>
      <p id="totalRounds"></p>
      <p id="fastestTime"></p>
      <p id="averageTime"></p>
      <button id="playAgainBtn" type="button">Play Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
